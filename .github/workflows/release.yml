name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output_name: clawdeckx-linux-amd64
          - goos: linux
            goarch: arm64
            output_name: clawdeckx-linux-arm64
          - goos: windows
            goarch: amd64
            output_name: clawdeckx-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            output_name: clawdeckx-darwin-amd64
          - goos: darwin
            goarch: arm64
            output_name: clawdeckx-darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build Frontend
        working-directory: web
        run: |
          echo "${{ github.run_number }}" > ../build.txt
          npm ci
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Generate Windows resource (icon + manifest)
        if: matrix.goos == 'windows'
        run: |
          go install github.com/tc-hib/go-winres@latest
          go-winres make --in cmd/clawdeckx/winres/winres.json --product-version "$(node -p "require('./web/package.json').version")" --file-version "$(node -p "require('./web/package.json').version")" --out cmd/clawdeckx/rsrc

      - name: Build Backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=$(node -p "require('./web/package.json').version" 2>/dev/null || echo "0.0.0")
          COMPAT=$(node -p "require('./web/package.json').openclawCompat" 2>/dev/null || echo "")
          BUILD_NUM="${{ github.run_number }}"
          LDFLAGS="-s -w -X ClawDeckX/internal/version.Version=${VERSION} -X ClawDeckX/internal/version.Build=${BUILD_NUM} -X ClawDeckX/internal/version.OpenClawCompat=${COMPAT}"
          go build -ldflags="${LDFLAGS}" -o dist/${{ matrix.output_name }} ./cmd/clawdeckx

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: dist/${{ matrix.output_name }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display downloaded files
        run: ls -R artifacts

      - name: Read release notes
        id: release_notes
        run: |
          if [ -f "RELEASE_NOTES.md" ]; then
            echo "has_notes=true" >> $GITHUB_OUTPUT
            # Use delimiter to handle multiline content
            echo "body<<EOF" >> $GITHUB_OUTPUT
            cat RELEASE_NOTES.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "has_notes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
          body: ${{ steps.release_notes.outputs.has_notes == 'true' && steps.release_notes.outputs.body || '' }}
          generate_release_notes: ${{ steps.release_notes.outputs.has_notes != 'true' }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build & Push Docker Image
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (for reading package.json)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Extract version and OpenClaw compat info
        id: meta
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          echo "REVISION=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          COMPAT=$(node -p "require('./web/package.json').openclawCompat" 2>/dev/null || echo "")
          echo "OPENCLAW_COMPAT=${COMPAT}" >> $GITHUB_OUTPUT
          MIN_VER=$(node -e "const compat = process.argv[1] || ''; const match = compat.match(/\d+\.\d+\.\d+(?:[-+._A-Za-z0-9]*)?/); process.stdout.write(match ? match[0] : '')" "$COMPAT")
          if [ -z "$MIN_VER" ]; then
            echo "OPENCLAW_VERSION=latest" >> $GITHUB_OUTPUT
          else
            echo "OPENCLAW_VERSION=${MIN_VER}" >> $GITHUB_OUTPUT
          fi

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: clawdeckx-linux-amd64
          path: dist/

      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: clawdeckx-linux-arm64
          path: dist/

      - name: Prepare binaries for Docker
        run: |
          cp dist/clawdeckx-linux-amd64 clawdeckx-linux-amd64
          cp dist/clawdeckx-linux-arm64 clawdeckx-linux-arm64
          chmod +x clawdeckx-linux-amd64 clawdeckx-linux-arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prebuilt
          platforms: linux/amd64
          push: true
          build-args: |
            TARGETARCH=amd64
            OPENCLAW_VERSION=${{ steps.meta.outputs.OPENCLAW_VERSION }}
            OPENCLAW_COMPAT=${{ steps.meta.outputs.OPENCLAW_COMPAT }}
            BUILD_VERSION=${{ steps.meta.outputs.VERSION }}
            BUILD_REVISION=${{ steps.meta.outputs.REVISION }}
            BUILD_DATE=${{ steps.meta.outputs.BUILD_DATE }}
          cache-from: type=gha,scope=docker-amd64
          cache-to: type=gha,mode=max,scope=docker-amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/clawdeckx:${{ steps.meta.outputs.VERSION }}-amd64

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prebuilt
          platforms: linux/arm64
          push: true
          build-args: |
            TARGETARCH=arm64
            OPENCLAW_VERSION=${{ steps.meta.outputs.OPENCLAW_VERSION }}
            OPENCLAW_COMPAT=${{ steps.meta.outputs.OPENCLAW_COMPAT }}
            BUILD_VERSION=${{ steps.meta.outputs.VERSION }}
            BUILD_REVISION=${{ steps.meta.outputs.REVISION }}
            BUILD_DATE=${{ steps.meta.outputs.BUILD_DATE }}
          cache-from: type=gha,scope=docker-arm64
          cache-to: type=gha,mode=max,scope=docker-arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/clawdeckx:${{ steps.meta.outputs.VERSION }}-arm64

      - name: Smoke test Docker image (amd64)
        run: |
          set -euo pipefail
          REPO=${{ secrets.DOCKERHUB_USERNAME }}/clawdeckx
          VERSION=${{ steps.meta.outputs.VERSION }}
          IMAGE="${REPO}:${VERSION}-amd64"
          CID=""
          cleanup() {
            if [ -n "$CID" ]; then
              docker rm -f "$CID" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT
          echo "==> Verifying OpenClaw is bundled..."
          docker run --rm --platform linux/amd64 "$IMAGE" openclaw --version
          echo "==> Verifying preinstalled runtime tools..."
          docker run --rm --platform linux/amd64 "$IMAGE" go version
          docker run --rm --platform linux/amd64 "$IMAGE" python3 --version
          docker run --rm --platform linux/amd64 "$IMAGE" uv --version
          docker run --rm --platform linux/amd64 "$IMAGE" ffmpeg -version
          docker run --rm --platform linux/amd64 "$IMAGE" jq --version
          docker run --rm --platform linux/amd64 "$IMAGE" rg --version
          docker run --rm --platform linux/amd64 "$IMAGE" wget --version
          docker run --rm --platform linux/amd64 "$IMAGE" make --version
          echo "==> Verifying ClawDeckX binary..."
          docker run --rm --platform linux/amd64 "$IMAGE" /app/clawdeckx --version || true
          echo "==> Starting container for health check..."
          CID=$(docker run -d --platform linux/amd64 -p 28791:18791 "$IMAGE")
          sleep 10
          echo "==> Checking /api/v1/health..."
          curl -sf http://localhost:28791/api/v1/health | head -c 500
          echo ""
          echo "==> Checking /api/v1/health?detailed=true..."
          curl -sf "http://localhost:28791/api/v1/health?detailed=true" | head -c 1000
          echo ""
          echo "==> Smoke test passed"

      - name: Smoke test Docker image (arm64)
        run: |
          set -euo pipefail
          REPO=${{ secrets.DOCKERHUB_USERNAME }}/clawdeckx
          VERSION=${{ steps.meta.outputs.VERSION }}
          IMAGE="${REPO}:${VERSION}-arm64"
          CID=""
          cleanup() {
            if [ -n "$CID" ]; then
              docker rm -f "$CID" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT
          echo "==> Verifying OpenClaw is bundled..."
          docker run --rm --platform linux/arm64 "$IMAGE" openclaw --version
          echo "==> Verifying preinstalled runtime tools..."
          docker run --rm --platform linux/arm64 "$IMAGE" go version
          docker run --rm --platform linux/arm64 "$IMAGE" python3 --version
          docker run --rm --platform linux/arm64 "$IMAGE" uv --version
          docker run --rm --platform linux/arm64 "$IMAGE" ffmpeg -version
          docker run --rm --platform linux/arm64 "$IMAGE" jq --version
          docker run --rm --platform linux/arm64 "$IMAGE" rg --version
          docker run --rm --platform linux/arm64 "$IMAGE" wget --version
          docker run --rm --platform linux/arm64 "$IMAGE" make --version
          echo "==> Starting container for health check..."
          CID=$(docker run -d --platform linux/arm64 -p 28792:18791 "$IMAGE")
          sleep 15
          echo "==> Checking /api/v1/health..."
          curl -sf http://localhost:28792/api/v1/health | head -c 500
          echo ""
          echo "==> Checking /api/v1/health?detailed=true..."
          curl -sf "http://localhost:28792/api/v1/health?detailed=true" | head -c 1000
          echo ""
          echo "==> Smoke test passed"

      - name: Create and push multi-arch manifest
        run: |
          VERSION=${{ steps.meta.outputs.VERSION }}
          REPO=${{ secrets.DOCKERHUB_USERNAME }}/clawdeckx
          docker buildx imagetools create \
            --tag ${REPO}:${VERSION} \
            --tag ${REPO}:latest \
            ${REPO}:${VERSION}-amd64 \
            ${REPO}:${VERSION}-arm64

      - name: Sync README to Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/clawdeckx
          readme-filepath: ./README.md
